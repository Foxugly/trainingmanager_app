      - refresh
    TokensUsed:
      type: object
      description: |-
        The ``{input, output}`` token-usage block returned by every AI endpoint
        (training/plan generation, session explain, training-block review). Shared
        so the shape is declared once instead of an inline_serializer per endpoint.
      properties:
        input:
          type: integer
        output:
          type: integer
      required:
      - input
      - output
    Topic:
      type: object
      description: |-
        A team topic. ``author`` is the nested public user; ``message_count``
        is the number of messages in the thread. ``team`` and ``author`` are
        derived from the URL / request and are read-only.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        audience:
          allOf:
          - $ref: '#/components/schemas/AudienceEnum'
          description: |-
            team = visible to all team members; coaches = visible only to the owner and managers (staff channel).

            * `team` - Whole team
            * `coaches` - Coaches only
        allow_athlete_replies:
          type: boolean
          description: Only meaningful when audience=team. When True, athlete members
            may post messages; coaches can always post.
        author:
          allOf:
          - $ref: '#/components/schemas/CustomUserPublic'
          readOnly: true
        message_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Bumped on each new message for activity-based ordering.
      required:
      - author
      - created_at
      - id
      - message_count
      - title
      - updated_at
    TopicCreationEnum:
      enum:
      - owner
      - coaches
      - members
      type: string
      description: |-
        * `owner` - Owner only
        * `coaches` - Owner and coaches
        * `members` - Everyone (incl. athletes)
    TopicMessage:
      type: object
      description: |-
        A single message. ``author`` is the nested public user; ``content``
        is sanitized via nh3 on every write.
      properties:
        id:
          type: integer
          readOnly: true
        content:
          type: string
          description: Rich HTML content (sanitized via nh3 on save).
        author:
          allOf:
          - $ref: '#/components/schemas/CustomUserPublic'
          readOnly: true
        edited_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Set when the message is edited after creation.
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - content
      - created_at
      - edited_at
      - id
    TopicMessageRequest:
      type: object
      description: |-
        A single message. ``author`` is the nested public user; ``content``
        is sanitized via nh3 on every write.
      properties:
        content:
          type: string
          minLength: 1
          description: Rich HTML content (sanitized via nh3 on save).
      required:
      - content
    TopicRequest:
      type: object
      description: |-
        A team topic. ``author`` is the nested public user; ``message_count``
        is the number of messages in the thread. ``team`` and ``author`` are
        derived from the URL / request and are read-only.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        audience:
          allOf:
          - $ref: '#/components/schemas/AudienceEnum'
          description: |-
            team = visible to all team members; coaches = visible only to the owner and managers (staff channel).

            * `team` - Whole team
            * `coaches` - Coaches only
        allow_athlete_replies:
          type: boolean
          description: Only meaningful when audience=team. When True, athlete members
            may post messages; coaches can always post.
      required:
      - title
    TrainingSlot:
      type: object
      description: |-
        One weekly training slot (weekday + start/end time).

        weekday uses Python's date.weekday() convention: Monday=0 … Sunday=6.
      properties:
        id:
          type: integer
          readOnly: true
        weekday:
          allOf:
          - $ref: '#/components/schemas/WeekdayEnum'
          description: |-
            Day of the week (Python convention: Monday=0 … Sunday=6).

            * `0` - Monday
            * `1` - Tuesday
            * `2` - Wednesday
            * `3` - Thursday
            * `4` - Friday
            * `5` - Saturday
            * `6` - Sunday
          minimum: 0
          maximum: 9223372036854775807
        hour_start:
          type: string
          format: time
          description: Slot start time (local team time).
        hour_end:
          type: string
          format: time
          description: Slot end time; must be after hour_start.
        place:
          allOf:
          - $ref: '#/components/schemas/PlaceMinimal'
          readOnly: true
          nullable: true
        sport:
          allOf:
          - $ref: '#/components/schemas/Sport'
          readOnly: true
      required:
      - hour_end
      - hour_start
      - id
      - place
      - sport
      - weekday
    TrainingSlotRequest:
      type: object
      description: |-
        One weekly training slot (weekday + start/end time).

        weekday uses Python's date.weekday() convention: Monday=0 … Sunday=6.
      properties:
        weekday:
          allOf:
          - $ref: '#/components/schemas/WeekdayEnum'
          description: |-
            Day of the week (Python convention: Monday=0 … Sunday=6).

            * `0` - Monday
            * `1` - Tuesday
            * `2` - Wednesday
            * `3` - Thursday
            * `4` - Friday
            * `5` - Saturday
            * `6` - Sunday
          minimum: 0
          maximum: 9223372036854775807
        hour_start:
          type: string
          format: time
          description: Slot start time (local team time).
        hour_end:
          type: string
          format: time
          description: Slot end time; must be after hour_start.
        place_id:
          type: integer
          writeOnly: true
          nullable: true
        sport_id:
          type: integer
          writeOnly: true
          nullable: true
      required:
      - hour_end
      - hour_start
      - weekday
    TrainingTemplate:
      type: object
      description: |-
        The team's reusable weekly training template.

        Body of PUT and shape of GET on /teams/{id}/training-template/. PUT
        atomically REPLACES the template: existing slots are deleted and
        recreated from `slots`, and default_pool/season_start/season_end are
        set on the team.
      properties:
        slots:
          type: array
          items:
            $ref: '#/components/schemas/TrainingSlot'
        default_pool:
          type: string
          default: ''
          maxLength: 255
        season_start:
          type: string
          format: date
          nullable: true
        season_end:
          type: string
          format: date
          nullable: true
      required:
      - slots
    TrainingTypeEnum:
      enum:
      - structured
      - freeform
      type: string
      description: |-
        * `structured` - Structured (rounds & exercises)
        * `freeform` - Free text
    TypeEnum:
      enum:
      - note_for_coach
      - note_for_athlete
      - message_new_topic
      - message_new_reply
      - performance_logged
      - pb_beaten
      - plan_generated
      - session_reminder
      type: string
      description: |-
        * `note_for_coach` - Note added on an athlete
        * `note_for_athlete` - A note was shared with you
        * `message_new_topic` - A new topic was created in your team
        * `message_new_reply` - A new message was posted in a topic
        * `performance_logged` - A performance was logged for you
        * `pb_beaten` - You beat a personal best
        * `plan_generated` - A new training plan was scheduled
        * `session_reminder` - You have a session tomorrow
    UnitEnum:
      enum:
      - s
      - m
      - reps
      - kg
      - pts
      type: string
      description: |-
        * `s` - Seconds
        * `m` - Meters
        * `reps` - Repetitions
        * `kg` - Kilograms
        * `pts` - Points
