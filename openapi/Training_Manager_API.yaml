components:
  schemas:
    AIPingRequestRequest:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          description: Prompt to send to Claude. Defaults to a hello-world prompt.
    AIPingResponse:
      type: object
      properties:
        text:
          type: string
        model:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        stop_reason:
          type: string
      required:
      - input_tokens
      - model
      - output_tokens
      - stop_reason
      - text
    AIUsageAggregateResponse:
      type: object
      description: Top-level aggregate response.
      properties:
        team_id:
          type: integer
        period:
          type: string
        exclude_ping:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/AIUsageAggregateRow'
      required:
      - data
      - exclude_ping
      - period
