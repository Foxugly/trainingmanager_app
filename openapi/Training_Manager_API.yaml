            visibility (vis_distance/vis_goal/vis_rounds).
          maxLength: 64
        vis_distance:
          allOf:
          - $ref: '#/components/schemas/VisibilityMode'
          description: |-
            Default visibility of a session's total distance to athletes. Inherited by new events; overridable per event.

