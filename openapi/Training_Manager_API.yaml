openapi: 3.0.3
info:
  title: Training Manager API
  version: 1.0.0
  description: API pour la gestion d entrainements
paths:
  /api/v1/ai/ping/:
    post:
      operationId: ai_ping_create
      description: Diagnostic ping to the Anthropic API.
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIPingRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIPingRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIPingRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIPingResponse'
          description: Claude responded successfully
        '400':
          description: Invalid prompt
        '500':
          description: AI configuration error
        '502':
          description: AI service error
  /api/v1/attachments/:
    get:
      operationId: attachments_list
      description: List the READY attachments for a target the caller can read. Both
        `target_type` and `target_id` are required query params.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: target_id
        schema:
          type: integer
        required: true
      - in: query
        name: target_type
        schema:
          type: string
          enum:
          - event
          - message
          - performance
          - program
        required: true
      tags:
      - attachments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttachmentList'
          description: ''
        '400':
          description: Missing/invalid query params (`missing_params`, `invalid_target_type`).
        '403':
          description: No read access to this target.
        '404':
          description: Target not found.
  /api/v1/attachments/{id}/:
    delete:
      operationId: attachments_destroy
      description: 'Delete an attachment: best-effort removal of the S3 object then
        the row. Caller must be the uploader or able to write the target.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attachment.
        required: true
      tags:
      - attachments
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Attachment deleted.
        '403':
          description: Not allowed to delete this attachment.
        '404':
          description: Attachment not found.
        '503':
          description: Attachments unconfigured (`attachments_unconfigured`).
  /api/v1/attachments/{id}/complete/:
    post:
      operationId: attachments_complete_create
      description: 'Finalize an upload: HEAD the S3 object, record its real size,
        and flip the Attachment to `ready`. Caller must be the uploader or able to
        write the target.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attachment.
        required: true
      tags:
      - attachments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
          description: ''
        '400':
          description: Upload not found in S3 (`upload_not_found`).
        '403':
          description: Not allowed to complete this attachment.
        '404':
          description: Attachment not found.
        '503':
          description: Attachments unconfigured (`attachments_unconfigured`).
  /api/v1/attachments/{id}/download/:
    get:
      operationId: attachments_download_retrieve
      description: Mint a short-lived presigned GET URL to download a ready attachment.
        Caller must be able to read the target.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attachment.
        required: true
      tags:
      - attachments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentDownloadResponse'
          description: Presigned GET URL.
        '403':
          description: No read access to this attachment's target.
        '404':
          description: Attachment not found.
        '409':
          description: Attachment not ready yet.
        '503':
          description: Attachments unconfigured (`attachments_unconfigured`).
  /api/v1/attachments/presign/:
    post:
      operationId: attachments_presign_create
      description: Request a presigned S3 PUT URL to upload a file and create a `pending`
        Attachment for an Event or Message target. Validates the MIME allow-list and
        the size cap, and that the caller may write to the target (event-team manager
        / message author or coach).
      tags:
      - attachments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignUploadRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PresignUploadRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PresignUploadRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignUploadResponse'
          description: Presigned PUT URL issued; a pending Attachment row was created.
        '400':
          description: 'Validation error. `code` is one of: `mime_not_allowed`, `file_too_large`,
            `invalid_target_type`, `validation_error`.'
        '403':
          description: You may not attach files to this target.
        '404':
          description: Target not found.
        '503':
          description: Attachments unconfigured (`attachments_unconfigured`).
  /api/v1/attendance-statuses/:
    get:
      operationId: attendance_statuses_list
      description: Returns the public AttendanceStatus serializer with localized 'label'.
        Available to all authenticated users. Pass ?include_inactive=true (staff only)
        to include soft-deleted rows.
      summary: List attendance statuses (public flavor)
      parameters:
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: If true and the user is staff, include soft-deleted (is_active=False)
          records in the result. Silently ignored for non-staff users.
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_default
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - attendance-statuses
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttendanceStatusList'
          description: ''
    post:
      operationId: attendance_statuses_create
      description: |-
        CRUD on the AttendanceStatus referential.

        Read: any authenticated user (default queryset filters is_active=True).
        Write: staff only. Soft delete bumps updated_at.
      summary: Create attendance status (staff only)
      tags:
      - attendance-statuses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceStatusAdmin'
          description: ''
  /api/v1/attendance-statuses/{id}/:
    get:
      operationId: attendance_statuses_retrieve
      description: |-
        CRUD on the AttendanceStatus referential.

        Read: any authenticated user (default queryset filters is_active=True).
        Write: staff only. Soft delete bumps updated_at.
      summary: Retrieve attendance status (admin flavor for staff)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance status.
        required: true
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: If true and the user is staff, include soft-deleted (is_active=False)
          records in the result. Silently ignored for non-staff users.
      tags:
      - attendance-statuses
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceStatusAdmin'
          description: ''
    put:
      operationId: attendance_statuses_update
      description: |-
        CRUD on the AttendanceStatus referential.

        Read: any authenticated user (default queryset filters is_active=True).
        Write: staff only. Soft delete bumps updated_at.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance status.
        required: true
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: If true and the user is staff, include soft-deleted (is_active=False)
          records in the result. Silently ignored for non-staff users.
      tags:
      - attendance-statuses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceStatusAdminRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceStatusAdmin'
          description: ''
    patch:
      operationId: attendance_statuses_partial_update
      description: |-
        CRUD on the AttendanceStatus referential.

        Read: any authenticated user (default queryset filters is_active=True).
        Write: staff only. Soft delete bumps updated_at.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance status.
        required: true
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: If true and the user is staff, include soft-deleted (is_active=False)
          records in the result. Silently ignored for non-staff users.
      tags:
      - attendance-statuses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceStatusAdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceStatusAdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceStatusAdminRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceStatusAdmin'
          description: ''
    delete:
      operationId: attendance_statuses_destroy
      description: Sets is_active=False; does not hard delete.
      summary: Soft delete attendance status (staff only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance status.
        required: true
      tags:
      - attendance-statuses
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/audit-log/:
    get:
      operationId: audit_log_list
      description: |-
        GET /api/v1/audit-log/ — review security-sensitive actions.

        Team owners and managers see audit entries scoped to teams they manage
        (``team.queries.managed_teams``). Superusers see all entries. The optional
        ``?team=<id>`` filter narrows to a single managed team (403 otherwise).
        Ordered newest-first and paginated like other list endpoints.
      summary: List audit log entries for teams you manage
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: team
        schema:
          type: integer
        description: Restrict to a single team you manage. A team you do not manage
          yields 403.
      tags:
      - audit-log
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogEntryList'
          description: ''
  /api/v1/auth/account/delete/:
    post:
      operationId: auth_account_delete_create
      description: |-
        POST /api/v1/auth/account/delete/ — authenticated: delete own account.

        Body: {current_password}. The caller must prove they still know their
        password before the account is irreversibly removed. On success the user
        row is deleted (memberships, athlete links, join requests, etc. cascade
        per their FK on_delete) and 204 No Content is returned.

        Safety guard: a user who still OWNS one or more teams (Team.owner ==
        user) is REFUSED with 409 (code owns_teams). Team.owner is
        on_delete=PROTECT, so the DB would raise ProtectedError on delete —
        we surface a clean, localized error instead and never cascade-delete
        teams. The guard intentionally counts ALL owned teams, not just
        is_active ones: a soft-deleted (is_active=False) team still references
        the user via the protected FK and would block the delete just the same.
        The user must transfer ownership (or hard-delete those teams) first.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDeleteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountDeleteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountDeleteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Account deleted. No content.
        '400':
          description: current_password missing (fields.current_password) or wrong
            (code=current_password_invalid).
        '401':
          description: Access token missing or invalid.
        '409':
          description: The user still owns one or more teams (code=owns_teams). Transfer
            ownership of those teams first; the account is NOT deleted.
  /api/v1/auth/email/change/confirm/:
    post:
      operationId: auth_email_change_confirm_create
      description: |-
        POST /api/v1/auth/email/change/confirm/ — public: finalize an email change.

        Body: {token}. Verifies the signed token, re-checks the new email is still
        free, then swaps the account's primary email. Public so the link works even
        if the SPA session has expired.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailChangeConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailChangeConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeConfirmResponse'
          description: Email changed. The SPA should refetch /me/.
        '400':
          description: Token invalid (code=invalid_or_expired_token).
        '409':
          description: email_taken (claimed since the request).
        '410':
          description: token_expired.
  /api/v1/auth/email/confirm/:
    post:
      operationId: auth_email_confirm_create
      description: |-
        POST /api/v1/auth/email/confirm/ — finalize signup with the key
        received by email. Returns JWT tokens for auto-login.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfirmResponse'
          description: Email verified. Returns {access, refresh, user}.
        '400':
          description: Token invalid or expired. code=invalid_or_expired_token.
  /api/v1/auth/email/resend/:
    post:
      operationId: auth_email_resend_create
      description: |-
        POST /api/v1/auth/email/resend/ — re-send confirmation link.

        Anti-leak: always returns 200 regardless of whether the email exists,
        so an attacker cannot enumerate registered emails. The fact that no
        email is sent for unknown addresses must remain invisible to the
        client.

        Rate-limited to 3 requests per hour per IP (anti-enumeration +
        anti-mail-spam).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailResendResponse'
          description: 'Always 200. Returns {detail, code: ''resend_processed''}.
            If a matching unverified account exists, a new confirmation email has
            been dispatched; otherwise the response is identical.'
        '400':
          description: Body validation error (e.g. malformed email).
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        POST /api/v1/auth/logout/ — revoke a refresh token.

        The caller authenticates with their access token and posts the refresh
        they want revoked. On success (204), that refresh — and any rotation
        descendants produced by /auth/token/refresh/ — can no longer be used.
        The access token itself is short-lived and not invalidated here; it
        naturally expires within ACCESS_TOKEN_LIFETIME.

        Ownership is verified before blacklisting: a holder of someone else's
        refresh string cannot use this endpoint to revoke it. We respond with
        a generic invalid_token to avoid signalling whether the token exists
        or only doesn't belong to the caller.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Refresh token blacklisted.
        '400':
          description: Refresh token missing, malformed, expired, already blacklisted,
            or not owned by the caller. code=invalid_token.
        '401':
          description: Access token missing or invalid.
        '429':
          description: Too Many Requests (rate limit hit).
  /api/v1/auth/magic-link/exchange/:
    post:
      operationId: auth_magic_link_exchange_create
      description: |-
        POST /api/v1/auth/magic-link/exchange/ — public: trade token for JWT.

        Body: {token}. The token is the signed string the user received in
        their magic-link email. On success returns the JWT pair (access +
        refresh) for sign-in. Error mapping:
          - expired token        -> 410 {"detail": "token_expired"}
          - invalid / tampered   -> 400 {"detail": "token_invalid"}
          - user no longer eligible (inactive / unconfirmed / deleted)
                                 -> 400 {"detail": "token_invalid"}
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicLinkExchangeResponse'
          description: Token accepted. Returns the JWT pair {access, refresh}.
        '400':
          description: 'Token invalid/tampered, or the user is no longer eligible
            (inactive / email-unconfirmed / deleted). Body: {"detail": "token_invalid"}.'
        '410':
          description: 'Token expired. Body: {"detail": "token_expired"}.'
  /api/v1/auth/magic-link/request/:
    post:
      operationId: auth_magic_link_request_create
      description: |-
        POST /api/v1/auth/magic-link/request/ — public: email a sign-in link.

        Anti-leak: ALWAYS returns 200 with the same body, whether the email
        matches an active, email-confirmed User or not. If it does, an email
        with a 15-minute signed magic-link is dispatched (frontend URL:
        {FRONTEND_URL}/auth/magic-link/{token}, no trailing slash). If it
        doesn't, the call is a silent no-op — the response is byte-for-byte
        identical (no user enumeration, timing-insensitive wording).

        Rate-limited to 5 requests per hour per IP.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicLinkRequestResponse'
          description: 'Always 200 with {"detail": "ok"}. If the email matches an
            active, email-confirmed account, a sign-in link has been dispatched; otherwise
            the response is identical (anti-leak).'
        '400':
          description: Body validation error (malformed email).
        '429':
          description: Too Many Requests (rate limit hit).
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: |-
        POST /api/v1/auth/password/change/ — authenticated: change own password.

        Body: {current_password, new_password}. The caller must prove they
        still know `current_password`; `new_password` is validated against
        Django's configured password validators (with the user as context) and
        must differ from the current one. On success the password is updated
        and a localized {detail} body is returned — NO tokens are issued. The
        short-lived access token (and any outstanding refresh) remain valid
        until they expire; this keeps the flow minimal for a user who is
        already authenticated and merely rotating their password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeResponse'
          description: Password updated. Returns {detail}. No tokens are issued.
        '400':
          description: current_password wrong (code=current_password_invalid), new_password
            equal to current (code=password_unchanged), or new_password rejected by
            validators (fields.new_password).
        '401':
          description: Access token missing or invalid.
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: |-
        POST /api/v1/auth/password/reset/ — public: request a password reset.

        Anti-leak: ALWAYS returns 200 with the same body, whether the email
        matches a User or not. If it does, an email with a reset link is
        dispatched (frontend URL: {FRONTEND_URL}/auth/reset-password/{key},
        no trailing slash). If it doesn't, the call is a silent no-op.

        Rate-limited to 3 requests per hour per IP. Turnstile required.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestResponse'
          description: 'Always 200. Returns {detail, code: ''password_reset_processed''}.
            If the email matches a registered account, a reset link has been dispatched;
            otherwise the response is identical (anti-leak).'
        '400':
          description: Body validation error (malformed email, missing token), or
            Turnstile failure (code=captcha_failed).
        '429':
          description: Too Many Requests (rate limit hit).
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: |-
        POST /api/v1/auth/password/reset/confirm/ — public: finalize a reset.

        Body: {key, new_password}. The key is the {uid}-{token} string the
        user received in their email. Returns the JWT pair on success
        (auto-login after reset).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmResponse'
          description: Password updated. Returns the JWT pair (access + refresh) for
            auto-login plus a minimal user payload.
        '400':
          description: Token invalid / expired (code=invalid_or_expired_token), or
            new_password rejected by validators (fields.new_password).
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        POST /api/v1/auth/register/ — public self-signup.

        Creates a CustomUser (is_active=True, email_confirmed=False), then sends a
        confirmation email carrying a Django default_token_generator link. No JWT is
        returned — the caller must confirm their email before obtaining tokens.

        Rate-limited to 5 requests per hour per IP (anti-bot signup).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: 'Account created. Returns {detail, code: ''registration_pending_verification'',
            email}. JWT is intentionally NOT returned — the user must confirm their
            email first.'
        '400':
          description: Validation error. Field-level codes include `email_taken`,
            password validators.
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Drop-in replacement for SimpleJWT's TokenObtainPairView that refuses
        login when the user's primary email is unverified.

        Rate-limited to 10 requests per minute per IP (anti-bruteforce).

        The @extend_schema(responses=...) above is required because SimpleJWT's
        TokenObtainPairSerializer describes the *input* shape ({username, password})
        and drf-spectacular would otherwise reuse it for the response — leading
        to a wrong codegen on the frontend (Observable<{username, password}>
        instead of Observable<{access, refresh}>).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifiedTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifiedTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifiedTokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPairResponse'
          description: 'JWT pair. Use `access` as a Bearer token; obtain a fresh `access`
            via /auth/token/refresh/ when it expires. The refresh TTL depends on `remember`:
            7 days (default) or 30 days when remember=true.'
        '400':
          description: Email not verified (code=email_not_verified) — the frontend
            should expose a 'Resend confirmation email' affordance — or any other
            validation error normalized by the custom exception handler.
        '401':
          description: Invalid username/email or password.
