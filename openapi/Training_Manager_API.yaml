  /api/v1/events/{id}/duplicate/:
    post:
      operationId: events_duplicate_create
      description: Duplicate this training session onto a new date, optionally repeating
        weekly. The copy deep-copies the source's Rounds into fresh Round rows (re-linking
        the shared Exercise library) so each session is fully independent; per-session
        members are NOT copied. With `repeat_weekly=true` and `occurrences=N`, N sessions
        are created on `date`, `date`+7d, ..., `date`+7*(N-1)d. With `repeat_weekly=false`
        exactly one copy is created (occurrences is forced to 1). Manager/owner of
        the event's team only.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateEventRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DuplicateEventRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DuplicateEventRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateEventResponse'
          description: Session(s) duplicated successfully
        '400':
          description: Invalid request body
        '403':
          description: Not a manager of this event team
        '404':
          description: Event not found / not in scope
