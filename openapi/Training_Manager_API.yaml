        is_default:
          type: boolean
          readOnly: true
        order:
          type: integer
          readOnly: true
        training_type:
          readOnly: true
          nullable: true
          description: |-
            Team override of the sport's default training type. Null = inherit Sport.default_training_type.

            * `structured` - Structured (rounds & exercises)
            * `freeform` - Free text
          oneOf:
          - $ref: '#/components/schemas/TrainingTypeEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - id
      - is_default
      - name
      - order
      - slug
      - training_type
    TeamStats:
      type: object
      description: |-
        Top-level read-only team statistics payload.

        Aggregates attendance, training volume and intensity for the team's
        events whose date falls within the requested window. Output-only:
        the view assembles a plain dict and passes it through this serializer
        for a clean, typed OpenAPI schema.

        `member` is null for the team aggregate, or `{id, name}` when the
        payload is scoped to a single athlete (via ?member=<id>).
      properties:
        period:
          $ref: '#/components/schemas/StatsPeriod'
        member:
          allOf:
          - $ref: '#/components/schemas/StatsMember'
          nullable: true
          description: The athlete the payload is scoped to, or null for the team
            aggregate.
        attendance:
          $ref: '#/components/schemas/StatsAttendance'
        volume:
          $ref: '#/components/schemas/StatsVolume'
        intensity:
          $ref: '#/components/schemas/StatsIntensity'
        roti:
