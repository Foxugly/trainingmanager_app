          type: boolean
          description: Show a shared session's total distance on its public link.
        public_show_goal:
          type: boolean
          description: Show a shared session's goal on its public link.
        public_show_rounds:
          type: boolean
          description: Show a shared session's rounds & exercises on its public link.
