          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
        language:
          allOf:
          - $ref: '#/components/schemas/LanguageEnum'
          default: en
        turnstile_token:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - first_name
      - last_name
      - password
      - turnstile_token
    RegisterResponse:
      type: object
      properties:
        detail:
          type: string
