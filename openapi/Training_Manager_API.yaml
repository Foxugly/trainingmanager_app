          allOf:
          - $ref: '#/components/schemas/JoinRequestPolicyEnum'
          description: |-
            Manual = managers accept/reject each TeamJoinRequest. Auto = every join request is accepted immediately on submission.

            * `manual` - Manual — managers accept/reject each request
            * `auto` - Auto-accept — every join request is accepted immediately
        topic_creation:
          allOf:
          - $ref: '#/components/schemas/TopicCreationEnum'
          description: |-
            Who may create messaging topics in this team. owner = team owner only; coaches = owner and managers; members = owner, managers, and active athlete members.

            * `owner` - Owner only
            * `coaches` - Owner and coaches
            * `members` - Everyone (incl. athletes)
