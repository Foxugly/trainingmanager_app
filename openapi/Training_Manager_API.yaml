    LogoutRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/logout/.

        The caller's access token authenticates the request; the refresh token
        they want to revoke is passed in the body. The view validates ownership
        (refresh.user_id == request.user.id) before blacklisting — without that
        check, a holder of someone else's refresh string could blacklist it
        unilaterally.
      properties:
        refresh:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - refresh
    MagicLinkExchangeRequestRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/magic-link/exchange/.

        `token` is the signed string the user received in their magic-link
        email (the SPA POSTs it back from /auth/magic-link/:token).
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    MagicLinkExchangeResponse:
      type: object
      description: |-
        Success body of POST /api/v1/auth/magic-link/exchange/ — the JWT
        pair for the freshly signed-in user.
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    MagicLinkRequestRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/magic-link/request/.

        Anti-leak by design — the view always returns the same 200 payload
        regardless of whether `email` matches a confirmed user. Validation
        here only enforces the field shape.
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    MagicLinkRequestResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    Me:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        email_confirmed:
          type: boolean
          readOnly: true
          description: True once the user has proven control of their email address
            (registration confirmation, password reset, or a verified email change).
            The login + magic-link gates require this. Replaces the former allauth
            EmailAddress.verified flag.
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        language:
          $ref: '#/components/schemas/LanguageEnum'
        weekly_recap_opt_in:
          type: boolean
          description: 'Per-user preference for the weekly recap email. Opt-out model:
            default True. When False, this user receives no weekly recap even for
            teams they own/manage that have it enabled.'
        digest_email:
          type: boolean
          description: When True, suppress immediate notification emails and instead
            send a single daily digest of the day's notifications. Opt-in (default
            False).
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        team_quota:
          allOf:
          - $ref: '#/components/schemas/TeamQuotaStatus'
          readOnly: true
        calendar_token:
          type: string
          readOnly: true
          description: Unguessable token embedded in the user's personal iCal (.ics)
            subscription URL. The token IS the authentication for that (otherwise
            anonymous) feed. Rotate it to revoke an old URL.
        member_id:
          type: integer
          nullable: true
          readOnly: true
      required:
      - calendar_token
      - date_joined
      - email
      - email_confirmed
      - id
      - is_staff
      - is_superuser
      - last_login
      - member_id
      - team_quota
