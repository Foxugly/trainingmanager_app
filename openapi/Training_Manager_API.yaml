  /api/v1/join-magic/:
    post:
      operationId: join_magic_create
      description: |-
        POST /api/v1/join-magic/ {token} — executes the encoded action.

        Reversal support (E-b semantic):
          - pending  + accept -> accepted (creates TeamMembership)
          - pending  + reject -> rejected (no membership)
          - accepted + reject -> rejected (revokes membership: sets left_at)
          - rejected + accept -> accepted (creates membership again)
          - cancelled + *    -> 409 conflict (requester withdrew, irreversible)
        responded_by is updated to the manager who made the latest call.
        Idempotent when the request is already in the target status.
      tags:
      - join-magic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamJoinRequestMagicActionPostRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TeamJoinRequestMagicActionPostRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TeamJoinRequestMagicActionPostRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamJoinRequestMagicActionResponse'
          description: Action executed (or no-op if already in target status). Returns
            the same payload shape as the preview, with the join_request reflecting
            the new status.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinMagicError'
          description: Invalid or expired token (code=invalid_or_expired_token), or
            missing token in body (code=token_required).
        '403':
          description: Not a manager of this team.
        '404':
          description: Join request not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinMagicCancelledResponse'
          description: 'Conflict: the request was cancelled by the requester and cannot
            be revived (code=request_cancelled). The body still contains the regular
            response payload alongside code/detail so the frontend can show context.'
  /api/v1/join-magic/{token}/:
    get:
      operationId: join_magic_retrieve
      description: |-
        GET /api/v1/join-magic/<token>/ — preview only. No state change.

        Safe for email link previewers (Outlook safe-links, Gmail bots).
        Returns the join request + action proposed by the token + current
        status + whether the action would reverse a previous decision +
        whether the action can still be performed (false if cancelled).
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - join-magic
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamJoinRequestMagicActionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinMagicError'
          description: Invalid or expired token (code=invalid_or_expired_token).
        '403':
          description: Not a manager of this team.
        '404':
          description: Join request not found.
