            * `after` - After the session
            * `never` - Never
        vis_rounds:
          allOf:
          - $ref: '#/components/schemas/VisibilityMode'
          description: |-
            Default visibility of a session's rounds (and their exercises) to athletes. Inherited by new events; overridable per event.

            * `always` - Always
            * `after` - After the session
            * `never` - Never
