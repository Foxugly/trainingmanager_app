  /api/v1/teams/{id}/stats/:
    get:
      operationId: teams_stats_retrieve
      description: |-
        Read-only aggregated statistics for the team's events whose `date` falls in the window [`from`, `to`] (both inclusive). Defaults to the last 12 weeks (`to` = today, `from` = today - 84 days) when both are absent; a single bound fills the other (`to` defaults to today, `from` defaults to `to` - 84 days). The span is clamped to a maximum of 2 years.

        Without `member` the payload is the **team aggregate** (owner/manager only). With `member=<id>` the payload is **scoped to that athlete**: allowed for the team's owner/managers for any member, or for the athlete viewing their OWN member record.
      summary: Team statistics (attendance, volume, intensity)
      parameters:
      - in: query
        name: from
        schema:
          type: string
          format: date
        description: Window start (inclusive, ISO YYYY-MM-DD). Defaults to `to` -
          84 days.
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this team.
        required: true
      - in: query
        name: member
        schema:
          type: integer
        description: Optional member id. When set, scopes the whole payload to that
          athlete. Owner/managers may request any member of the team; an athlete may
          only request their own member id (otherwise 403). Member not in the team
          -> 404.
      - in: query
        name: to
        schema:
          type: string
          format: date
        description: Window end (inclusive, ISO YYYY-MM-DD). Defaults to today.
      tags:
      - teams
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamStats'
          description: ''
