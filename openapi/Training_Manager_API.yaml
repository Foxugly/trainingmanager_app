    AuditLogEntry:
      type: object
      description: |-
        Read-only view of an audit log entry for coaches.

        ``action_display`` is the localized human label for the stable ``action``
        code. All fields are read-only — the log is append-only and only written
        via ``audit.services.record``.
      properties:
        id:
          type: integer
          readOnly: true
        actor:
          type: integer
          readOnly: true
          nullable: true
          description: The user who performed the action. NULL = system/anonymous.
        actor_label:
          type: string
          readOnly: true
          description: Snapshot of the actor's username/display at the time. Survives
            actor deletion or anonymization (when the FK is SET_NULL).
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
          description: |-
            Stable code identifying the audited action.

            * `member_anonymized` - Member anonymized
            * `member_removed` - Member removed from team
            * `account_deleted` - Account deleted
            * `session_shared` - Session shared publicly
            * `session_unshared` - Session sharing disabled
            * `attachment_deleted` - Attachment deleted
            * `team_config_updated` - Team configuration updated
        action_display:
          type: string
          readOnly: true
        team:
          type: integer
          readOnly: true
          nullable: true
          description: Team the action is scoped to (used for read scoping). NULL
            = not team-scoped, e.g. an account self-delete.
        target_repr:
          type: string
          readOnly: true
          description: Human-readable description of the target.
        metadata:
          readOnly: true
          description: Small structured extra context (no unnecessary PII).
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - action_display
      - actor
      - actor_label
      - created_at
