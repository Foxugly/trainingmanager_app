    PasswordChangeRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/password/change/ (authenticated).

        The caller proves they still know `current_password` and supplies a
        `new_password` validated against Django's configured validators with
        the authenticated user as context. The view performs the
        `check_password` comparison and the equality check — the serializer
        only enforces field shapes and the password strength rules.
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - current_password
      - new_password
    PasswordChangeResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    PasswordResetConfirmRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/password/reset/confirm/. The view decodes
        `key` (uid + token) and validates `new_password` against Django's
        password validators with the matched user as context.
      properties:
        key:
          type: string
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - key
      - new_password
    PasswordResetConfirmResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/PasswordResetConfirmUser'
      required:
      - access
      - refresh
      - user
    PasswordResetConfirmUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        language:
          type: string
      required:
      - email
      - first_name
      - id
      - language
      - last_name
    PasswordResetRequestRequest:
      type: object
      description: |-
        Body of POST /api/v1/auth/password/reset/.

        Anti-leak by design — the view always returns the same 200 payload
        regardless of whether `email` matches a User. Validation here only
        enforces field shapes.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        turnstile_token:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - turnstile_token
    PasswordResetRequestResponse:
      type: object
      properties:
        detail:
          type: string
        code:
          $ref: '#/components/schemas/PasswordResetRequestResponseCodeEnum'
      required:
      - code
      - detail
