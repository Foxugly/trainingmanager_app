          type: string
          minLength: 1
          description: Rich HTML content (sanitized via nh3 on save).
    PatchedTrainingSlotRequest:
      type: object
      description: |-
        One weekly training slot (weekday + start/end time).

        weekday uses Python's date.weekday() convention: Monday=0 … Sunday=6.
      properties:
        weekday:
          allOf:
          - $ref: '#/components/schemas/WeekdayEnum'
          description: |-
            Day of the week (Python convention: Monday=0 … Sunday=6).

            * `0` - Monday
            * `1` - Tuesday
            * `2` - Wednesday
            * `3` - Thursday
            * `4` - Friday
            * `5` - Saturday
            * `6` - Sunday
          minimum: 0
          maximum: 9223372036854775807
        hour_start:
          type: string
          format: time
          description: Slot start time (local team time).
        hour_end:
          type: string
          format: time
          description: Slot end time; must be after hour_start.
        place_id:
          type: integer
          writeOnly: true
          nullable: true
        sport_id:
          type: integer
          writeOnly: true
          nullable: true
    Performance:
      type: object
      description: |-
        Read/write serializer for a single Performance row.

        `team` and `member` are writable PrimaryKeyRelatedFields on create; on
        update they are ignored (a performance never moves to another member or
        team — the view drops them from validated_data in update()). `created_by`
        is set by the view from request.user and is read-only here.
      properties:
        id:
          type: integer
          readOnly: true
        team:
          type: integer
        member:
          type: integer
        label:
          type: string
          description: Discipline / test name, e.g. '100m freestyle' or 'Cooper test'.
          maxLength: 120
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
          description: Numeric result, interpreted by unit (seconds for time, meters
            for distance, etc.).
        unit:
          $ref: '#/components/schemas/UnitEnum'
        is_lower_better:
          type: boolean
          readOnly: true
        recorded_on:
          type: string
          format: date
          description: Date the performance was achieved.
        notes:
          type: string
        created_by:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - is_lower_better
      - label
      - member
      - recorded_on
      - team
      - updated_at
      - value
    PerformanceRequest:
      type: object
      description: |-
        Read/write serializer for a single Performance row.

        `team` and `member` are writable PrimaryKeyRelatedFields on create; on
        update they are ignored (a performance never moves to another member or
        team — the view drops them from validated_data in update()). `created_by`
